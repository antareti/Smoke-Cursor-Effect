<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke Cursor — Ultimate Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --bg-dark: #050505;
            --accent-gradient: linear-gradient(135deg, #fff3b0 0%, #ffcc00 50%, #ff9500 100%);
        }

        * { box-sizing: border-box; cursor: none; }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
        }

        /* --- Custom Cursor --- */
        #cursor-dot {
            width: 8px; height: 8px; background: #fff;
            position: fixed; pointer-events: none; z-index: 9999;
            border-radius: 50%; transform: translate(-50%, -50%);
        }
        #cursor-outline {
            width: 45px; height: 45px; border: 1px solid var(--gold);
            position: fixed; pointer-events: none; z-index: 9998;
            border-radius: 50%; transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s;
        }

        /* --- Live Status Badge --- */
        .live-status {
            position: fixed; top: 20px; right: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 10px 15px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 12px; display: flex; align-items: center; gap: 8px;
            z-index: 100;
        }
        .status-dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* --- Hero Composition --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 60px 20px; }

        .header-section { text-align: center; margin-bottom: 20px; }
        .title {
            font-size: clamp(40px, 9vw, 100px); font-weight: 800; margin: 0;
            background: var(--accent-gradient); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 30px var(--gold-glow));
            letter-spacing: -2px;
        }

        .hero-layout {
            display: flex; align-items: center; justify-content: center;
            gap: 40px; margin: 20px 0 80px; position: relative;
        }

        .model-container {
            width: 300px; height: 550px; position: relative;
            flex-shrink: 0; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .model-img {
            width: 100%; height: 100%; object-fit: cover; border-radius: 40px;
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            filter: grayscale(0.4) brightness(0.8); transition: 0.5s;
        }
        .model-container:hover .model-img { filter: grayscale(0) brightness(1.1); transform: scale(1.02); }

        .laptop-wrapper { perspective: 2000px; flex-grow: 1; max-width: 800px; }
        .laptop { transform-style: preserve-3d; transition: 0.1s; }
        .laptop-screen {
            background: #000; border: 12px solid #1a1a1a; border-radius: 20px 20px 0 0;
            aspect-ratio: 16/10; overflow: hidden; box-shadow: 0 0 100px rgba(255, 204, 0, 0.15);
        }
        #smokeCanvas { width: 100%; height: 100%; }

        /* --- Presets Control --- */
        .preset-panel {
            display: flex; justify-content: center; gap: 15px; margin-top: -30px;
            position: relative; z-index: 20;
        }
        .preset-btn {
            background: rgba(20,20,20,0.8); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px; border-radius: 15px; color: #fff; font-size: 13px;
            cursor: none; transition: 0.3s; backdrop-filter: blur(10px);
        }
        .preset-btn:hover { background: var(--gold); color: #000; transform: translateY(-3px); }

        /* --- Main UI Card --- */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
            backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50px; padding: 60px; max-width: 900px; margin: 0 auto;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6); text-align: center;
        }

        .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin: 40px 0; }
        .feature-item h3 { color: var(--gold); margin-bottom: 5px; }
        .feature-item p { font-size: 14px; opacity: 0.6; }

        .btn-buy {
            display: inline-flex; align-items: center; gap: 15px;
            padding: 25px 60px; background: var(--accent-gradient);
            color: #000; text-decoration: none; border-radius: 100px;
            font-weight: 800; font-size: 22px; transition: 0.4s;
            box-shadow: 0 20px 50px rgba(255, 204, 0, 0.3);
        }
        .btn-buy:hover { transform: scale(1.05); box-shadow: 0 30px 70px rgba(255, 204, 0, 0.5); }

        footer { padding: 80px 20px; text-align: center; opacity: 0.2; font-size: 11px; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>

<div class="live-status">
    <div class="status-dot"></div>
    <span>1,248 USERS ONLINE</span>
</div>

<div class="container">
    <div class="header-section">
        <span style="color: var(--gold); letter-spacing: 5px; font-weight: 600;">EXTREME UTILITY</span>
        <h1 class="title">SMOKE CURSOR</h1>
    </div>

    <div class="hero-layout">
        <div class="model-container" id="mLeftContainer">
            <img src="https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?auto=format&fit=crop&w=400&q=80" alt="Cyber" class="model-img">
        </div>

        <div class="laptop-wrapper">
            <div class="laptop" id="mainLaptop">
                <div class="laptop-screen">
                    <canvas id="smokeCanvas"></canvas>
                </div>
                <div class="preset-panel">
                    <button class="preset-btn" onclick="setPreset('rainbow')">🌈 Rainbow</button>
                    <button class="preset-btn" onclick="setPreset('gold')">✨ Gold</button>
                    <button class="preset-btn" onclick="setPreset('fire')">🔥 Infernal</button>
                </div>
            </div>
        </div>

        <div class="model-container" id="mRightContainer">
            <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&w=400&q=80" alt="Fashion" class="model-img">
        </div>
    </div>

    <div class="glass-card">
        <div class="features-grid">
            <div class="feature-item">
                <h3>4K SPREAD</h3>
                <p>Высочайшая плотность частиц дыма</p>
            </div>
            <div class="feature-item">
                <h3>LOW LATENCY</h3>
                <p>Задержка ввода менее 1мс</p>
            </div>
            <div class="feature-item">
                <h3>AUTORUN</h3>
                <p>Запуск вместе с Windows / MacOS</p>
            </div>
        </div>
        
        <div style="margin-bottom: 40px;">
            <p style="opacity: 0.5; margin: 0;">LIFETIME ACCESS</p>
            <div style="font-size: 80px; font-weight: 800; line-height: 1;">$1</div>
        </div>

        <a href="https://t.me/+cakswAC6-pw1MTgy" class="btn-buy">
            GET YOUR KEY NOW
        </a>
    </div>
</div>

<footer>SMOKE CURSOR EXPERIMENTAL — BUILT FOR PERFORMANCE</footer>

<script>
    // 1. Улучшенный курсор
    const dot = document.getElementById('cursor-dot');
    const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', (e) => {
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        outline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 500, fill: "forwards" });
    });

    // 2. Параллакс эффект для моделей и ноутбука
    window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5);
        const y = (e.clientY / window.innerHeight - 0.5);
        
        document.getElementById('mainLaptop').style.transform = `rotateY(${x * 30}deg) rotateX(${-y * 20}deg)`;
        document.getElementById('mLeftContainer').style.transform = `translateX(${x * 40}px) translateY(${y * 20}px) rotateZ(${-x * 5}deg)`;
        document.getElementById('mRightContainer').style.transform = `translateX(${x * 40}px) translateY(${y * 20}px) rotateZ(${-x * 5}deg)`;
    });

    // 3. Система Дыма с пресетами
    const canvas = document.getElementById('smokeCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let hue = 0;
    let currentPreset = 'rainbow';

    function setPreset(p) { currentPreset = p; particles = []; }

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = Math.random() * 3 - 1.5;
            this.speedY = Math.random() * -2 - 1;
            this.opacity = 1;
            
            if(currentPreset === 'rainbow') this.color = `hsl(${hue}, 100%, 60%)`;
            else if(currentPreset === 'gold') this.color = `hsl(45, 100%, ${50 + Math.random()*20}%)`;
            else if(currentPreset === 'fire') this.color = `hsl(${Math.random()*30}, 100%, 50%)`;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.opacity -= 0.015;
            if(this.size > 0.2) this.size -= 0.05;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        if(cx > 0 && cx < canvas.width && cy > 0 && cy < canvas.height) {
            for(let i=0; i<3; i++) particles.push(new Particle(cx, cy));
            hue += 3;
        }
    });

    function anim() {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        particles = particles.filter(p => p.opacity > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
