<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smoke Cursor — Premium Desktop Utility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #ffcc00;
            --gold-glow: rgba(255, 204, 0, 0.4);
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.6);
            --accent-gradient: linear-gradient(135deg, #fff3b0 0%, #ffcc00 50%, #ff9500 100%);
        }

        * { box-sizing: border-box; cursor: none; }

        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- Background --- */
        .bg-visuals {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        /* --- Custom Cursor --- */
        #cursor-dot {
            width: 8px; height: 8px; background: #fff;
            position: fixed; pointer-events: none; z-index: 9999;
            border-radius: 50%; transform: translate(-50%, -50%);
        }
        #cursor-outline {
            width: 40px; height: 40px; border: 2px solid var(--gold);
            position: fixed; pointer-events: none; z-index: 9998;
            border-radius: 50%; transform: translate(-50%, -50%);
            transition: all 0.1s ease-out;
        }

        /* --- Main Layout --- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
            position: relative;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--gold-glow));
            margin: 0;
        }

        /* --- Hero Composition (Laptop + Models) --- */
        .hero-composition {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 40px 0 100px;
            position: relative;
        }

        .model-side {
            width: 250px;
            height: 450px;
            object-fit: cover;
            border-radius: 30px;
            filter: grayscale(0.5) contrast(1.2);
            mask-image: linear-gradient(to bottom, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent);
            transition: transform 0.3s ease-out, filter 0.3s;
            z-index: 1;
        }

        .model-side:hover {
            filter: grayscale(0) contrast(1.1);
            transform: scale(1.05);
        }

        .model-left { transform: rotateY(20deg); }
        .model-right { transform: rotateY(-20deg); }

        /* --- Laptop Styling --- */
        .laptop-wrapper {
            perspective: 2000px;
            flex-grow: 1;
            max-width: 700px;
            z-index: 2;
        }

        .laptop {
            width: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(5deg);
        }

        .laptop-screen {
            background: #111;
            border: 10px solid #222;
            border-radius: 15px 15px 0 0;
            aspect-ratio: 16/10;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.2);
        }

        #smokeCanvas { width: 100%; height: 100%; display: block; }

        .laptop-bottom {
            height: 20px;
            background: linear-gradient(to bottom, #333, #111);
            border-radius: 0 0 15px 15px;
            transform: rotateX(40deg);
            transform-origin: top;
        }

        /* --- Cards --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            text-align: center;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }

        .f-box {
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .btn-main {
            display: inline-block;
            padding: 20px 50px;
            background: var(--accent-gradient);
            color: #000;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px var(--gold-glow);
            transition: 0.3s;
        }

        .btn-main:hover { transform: translateY(-5px) scale(1.05); }

        footer { padding: 40px; text-align: center; opacity: 0.3; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-outline"></div>
<div class="bg-visuals"></div>

<div class="container">
    <div class="header-section">
        <h1 class="title">SMOKE CURSOR</h1>
        <p style="color: #888;">Premium Experience for High-End Setups</p>
    </div>

    <div class="hero-composition">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=250&h=450&auto=format&fit=crop" 
             alt="Model Left" class="model-side model-left" id="mLeft">

        <div class="laptop-wrapper">
            <div class="laptop" id="mainLaptop">
                <div class="laptop-screen">
                    <canvas id="smokeCanvas"></canvas>
                </div>
                <div class="laptop-bottom"></div>
            </div>
        </div>

        <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=250&h=450&auto=format&fit=crop" 
             alt="Model Right" class="model-side model-right" id="mRight">
    </div>

    <div class="glass-card">
        <h2>Оживи свой рабочий стол</h2>
        <div class="features">
            <div class="f-box"><strong>RGB Дым</strong><br><small>Плавные переливы</small></div>
            <div class="f-box"><strong>0% Нагрузки</strong><br><small>C++ Оптимизация</small></div>
            <div class="f-box"><strong>Overlay</strong><br><small>Поверх всех окон</small></div>
        </div>
        <div style="margin-bottom: 30px;">
            <span style="font-size: 3rem; font-weight: 800;">$1</span>
        </div>
        <a href="https://t.me/+cakswAC6-pw1MTgy" class="btn-main">КУПИТЬ СЕЙЧАС</a>
    </div>
</div>

<footer>© 2026 SMOKE CURSOR • DESIGNED FOR LUXURY</footer>

<script>
    // 1. Курсор
    const dot = document.getElementById('cursor-dot');
    const outline = document.getElementById('cursor-outline');
    window.addEventListener('mousemove', (e) => {
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        outline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 400, fill: "forwards" });
    });

    // 2. Параллакс для моделей и ноутбука
    window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20;
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        
        document.getElementById('mainLaptop').style.transform = `rotateY(${x}deg) rotateX(${-y + 5}deg)`;
        document.getElementById('mLeft').style.transform = `translateX(${-x}px) rotateY(${20 + x}deg)`;
        document.getElementById('mRight').style.transform = `translateX(${-x}px) rotateY(${-20 + x}deg)`;
    });

    // 3. Цветной дым на холсте
    const canvas = document.getElementById('smokeCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let hue = 0;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.size = Math.random() * 4 + 1;
            this.speedX = Math.random() * 2 - 1;
            this.speedY = Math.random() * 2 - 1;
            this.color = `hsl(${hue}, 100%, 50%)`;
            this.opacity = 1;
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            this.opacity -= 0.01;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    window.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
        const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        if(cx > 0 && cx < canvas.width && cy > 0 && cy < canvas.height) {
            for(let i=0; i<5; i++) particles.push(new Particle(cx, cy));
            hue += 5;
        }
    });

    function anim() {
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        particles = particles.filter(p => p.opacity > 0);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(anim);
    }
    anim();
</script>
</body>
</html>
